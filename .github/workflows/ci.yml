name: phase2-ci

on:
  pull_request:
    branches:
      - main

jobs:
  sqlfluff_lint:
    runs-on: ubuntu-latest
    env:
      DBT_HOST: localhost
      DBT_PORT: "5432"
      DBT_USER: lint_user
      DBT_PASSWORD: lint_password
      DBT_DATABASE: lint_db
      DBT_SCHEMA: analytics
      DBT_THREADS: "4"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dbt + SQLFluff
        run: |
          python -m pip install --upgrade pip
          pip install dbt-postgres sqlfluff sqlfluff-templater-dbt

      - name: Install dbt packages
        run: dbt deps --project-dir dbt --profiles-dir dbt

      - name: Lint dbt models
        run: sqlfluff lint dbt/models --config .sqlfluff

      - name: Lint standalone analysis SQL
        run: sqlfluff lint sql/analysis --dialect postgres --templater jinja

  dbt_test:
    runs-on: ubuntu-latest
    env:
      DBT_HOST: ${{ secrets.DBT_HOST }}
      DBT_PORT: ${{ secrets.DBT_PORT }}
      DBT_USER: ${{ secrets.DBT_USER }}
      DBT_PASSWORD: ${{ secrets.DBT_PASSWORD }}
      DBT_DATABASE: ${{ secrets.DBT_DATABASE }}
      DBT_SCHEMA: ${{ secrets.DBT_SCHEMA }}
      DBT_THREADS: ${{ secrets.DBT_THREADS }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dbt
        run: |
          python -m pip install --upgrade pip
          pip install dbt-postgres

      - name: Install dbt packages
        run: dbt deps --project-dir dbt --profiles-dir dbt

      - name: Run dbt build and tests
        run: dbt build --project-dir dbt --profiles-dir dbt --select +fact_race_results+
