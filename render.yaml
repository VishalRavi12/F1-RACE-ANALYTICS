services:
  - type: web
    name: f1-race-analytics
    env: python
    plan: free
    autoDeploy: true
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run app/streamlit_app.py --server.address=0.0.0.0 --server.port=$PORT --server.headless=true
    envVars:
        - key: DATABASE_URL
          sync: false
        - key: DBT_SCHEMA
          value: analytics

